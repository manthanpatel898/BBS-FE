name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: bbs-fe-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy BBS-FE
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Build static site
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || vars.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Validate deployment configuration
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          S3_BUCKET: ${{ secrets.S3_BUCKET || vars.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID || vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          test -n "$AWS_REGION" || { echo "AWS_REGION is missing in the production environment secrets or variables."; exit 1; }
          test -n "$AWS_ROLE_TO_ASSUME" || { echo "AWS_ROLE_TO_ASSUME is missing in the production environment secrets or variables."; exit 1; }
          test -n "$S3_BUCKET" || { echo "S3_BUCKET is missing in the production environment secrets or variables."; exit 1; }
          test -n "$CLOUDFRONT_DISTRIBUTION_ID" || { echo "CLOUDFRONT_DISTRIBUTION_ID is missing in the production environment secrets or variables."; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}

      - name: Upload site to S3
        run: |
          aws s3 sync out s3://${{ secrets.S3_BUCKET || vars.S3_BUCKET }} \
            --delete \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Apply long cache to immutable Next.js assets
        run: |
          aws s3 cp out/_next/static s3://${{ secrets.S3_BUCKET || vars.S3_BUCKET }}/_next/static \
            --recursive \
            --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID || vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
